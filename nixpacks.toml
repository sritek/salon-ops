# Nixpacks configuration for Railway
# This tells Railway how to build and run your Fastify API

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm_9"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile --prod=false"
]

[phases.build]
cmds = [
  "pnpm --filter @salon-ops/api... build",
  "pnpm --filter @salon-ops/api db:generate"
]

[start]
cmd = "cd apps/api && pnpm db:migrate:prod && node dist/server.js"

[variables]
NODE_ENV = "production"
